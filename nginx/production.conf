server {
  listen 80;
  server_name edition.christaylordeveloper.co.uk;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name edition.christaylordeveloper.co.uk;

  ssl_certificate     /etc/letsencrypt/live/edition.christaylordeveloper.co.uk/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/edition.christaylordeveloper.co.uk/privkey.pem;

  root /usr/share/nginx/html;
  index index.html index.htm;

  location ~ /.well-known/acme-challenge/ {
    # For renewals.
    root /var/www/certbot;
  }
}
